<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Sword Portfolio</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #00a2ff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 { color: var(--accent); }
        
        .portfolio-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .sword-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .sword-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }
        .image-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .image-comparison { grid-template-columns: 1fr; }
        }
        .img-container {
            text-align: center;
        }
        img {
            width: 100%;
            border-radius: 8px;
            display: block;
            margin-bottom: 8px;
        }
        .label {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sword Modeling Portfolio</h1>
        <p>Showcasing the journey from Blender to Roblox Studio.</p>
    </header>

    <div class="portfolio-grid">
        <div class="sword-card">
            <div class="sword-title">Longsword</div>
            <div class="image-comparison">
                <div class="img-container">
                    <img src="blenderlongsword2.png" alt="Blender Render">
                    <div class="label">Blender Render</div>
                </div>
                <div class="img-container">
                    <img src="rblxlongsword1.png" alt="Roblox Studio Render">
                    <div class="label">Roblox Studio</div>
                </div>
            </div>
        </div>

        </div>
</div>

</body>
</html>
