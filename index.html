<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sword Portfolio</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0f0f0f;
            --accent: #0084ff;
            --text-main: #ffffff;
            --text-dim: #666;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 60px 20px;
        }

        .container { max-width: 1100px; margin: auto; }

        header { margin-bottom: 80px; text-align: left; }
        h1 { font-size: 1rem; letter-spacing: 5px; text-transform: uppercase; color: var(--text-dim); }

        /* Gallery Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 60px;
        }

        @media (max-width: 600px) {
            .portfolio-grid { grid-template-columns: 1fr; }
        }

        .sword-entry { margin-bottom: 20px; }
        .sword-name { font-size: 0.9rem; margin-bottom: 15px; color: var(--text-dim); border-bottom: 1px solid #222; padding-bottom: 10px; }

        .image-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .img-wrap {
            position: relative;
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            cursor: zoom-in;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Ensures full image is visible */
            transition: transform 0.3s ease;
        }

        .img-wrap:hover img { transform: scale(1.05); }

        .label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 0.6rem;
            text-transform: uppercase;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            color: var(--accent);
        }

        /* Interactive Popup (Lightbox) */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            cursor: grab;
            overflow: hidden;
            touch-action: none;
        }

        #lightbox-img {
            position: absolute;
            max-height: 90vh;
            user-select: none;
            -webkit-user-drag: none;
        }

        #close-btn {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 30px; color: white;
            cursor: pointer; z-index: 1001;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sword Works</h1>
    </header>

    <div class="portfolio-grid">
        
        <div class="sword-entry">
            <div class="sword-name">01 // LONGSWORD</div>
            <div class="image-pair">
                <div class="img-wrap" onclick="openLightbox('assets/blenderlongsword2.png')">
                    <img src="assets/blenderlongsword2.png">
                    <div class="label">Blender</div>
                </div>
                <div class="img-wrap" onclick="openLightbox('assets/rblxlongsword1.png')">
                    <img src="assets/rblxlongsword1.png">
                    <div class="label">Studio</div>
                </div>
            </div>
        </div>
        </div>
</div>

<div id="lightbox" onmousedown="startDrag(event)" onmousemove="drag(event)" onmouseup="endDrag()" onmouseleave="endDrag()">
    <span id="close-btn" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="" draggable="false">
</div>

<script>
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    
    let isDragging = false;
    let startX, startY, currentX = 0, currentY = 0;

    function openLightbox(src) {
        lbImg.src = src;
        lightbox.style.display = 'flex';
        lightbox.style.alignItems = 'center';
        lightbox.style.justifyContent = 'center';
        // Reset position
        currentX = 0; currentY = 0;
        lbImg.style.transform = `translate(0px, 0px)`;
    }

    function closeLightbox() {
        lightbox.style.display = 'none';
    }

    function startDrag(e) {
        if (e.target === lbImg) {
            isDragging = true;
            lightbox.style.cursor = 'grabbing';
            startX = e.clientX - currentX;
            startY = e.clientY - currentY;
        }
    }

    function drag(e) {
        if (!isDragging) return;
        e.preventDefault();
        currentX = e.clientX - startX;
        currentY = e.clientY - startY;
        lbImg.style.transform = `translate(${currentX}px, ${currentY}px)`;
    }

    function endDrag() {
        isDragging = false;
        lightbox.style.cursor = 'grab';
    }

    // Close on background click
    lightbox.onclick = function(e) {
        if (e.target === lightbox) closeLightbox();
    }
</script>

</body>
</html>
