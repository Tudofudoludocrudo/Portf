<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH.STUDIO | Elite Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* --- CUSTOM CURSOR --- */
        #cursor {
            position: fixed; width: 20px; height: 20px;
            background: var(--accent); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transition: transform 0.1s ease;
        }

        /* --- DYNAMIC BACKGROUND --- */
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 1;
        }

        /* --- LAYOUT --- */
        .hero {
            height: 60vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .hero h1 { 
            font-size: clamp(3rem, 10vw, 6rem); font-weight: 700; 
            letter-spacing: -4px; line-height: 0.9;
        }
        .hero p { color: var(--accent); letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem; margin-top: 20px; }

        .container { max-width: 1400px; margin: auto; padding: 0 5%; position: relative; z-index: 2; }

        /* --- PROJECT CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(600px, 1fr)); gap: 80px; padding-bottom: 150px; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

        .card { position: relative; }
        .img-stack {
            position: relative; border-radius: 2px; overflow: hidden;
            background: #080808; border: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
        }
        .img-stack div { position: relative; overflow: hidden; aspect-ratio: 4/5; }
        .img-stack img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: grayscale(100%) brightness(0.7); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .card:hover img { filter: grayscale(0%) brightness(1); transform: scale(1.05); }

        /* --- TECH SPECS --- */
        .specs {
            display: flex; gap: 10px; margin-top: 20px;
        }
        .badge {
            font-size: 0.6rem; padding: 4px 10px; border: 1px solid var(--border);
            border-radius: 100px; color: #666; text-transform: uppercase; letter-spacing: 1px;
        }
        .card:hover .badge { color: var(--accent); border-color: var(--accent); }

        .card-title { font-size: 1.5rem; margin-top: 10px; font-weight: 500; display: flex; align-items: center; gap: 15px; }
        .card-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        /* --- CONTACT --- */
        .contact-section { 
            padding: 150px 0; text-align: center; border-top: 1px solid var(--border); 
        }
        .discord-btn {
            background: white; color: black; padding: 20px 40px; 
            border-radius: 100px; font-weight: 700; text-decoration: none;
            display: inline-block; transition: 0.3s;
        }
        .discord-btn:hover { background: var(--accent); transform: scale(1.05); }

        /* --- LIGHTBOX --- */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center;
        }
        #lightbox img { max-height: 90vh; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="vignette"></div>

    <div class="container">
        <section class="hero">
            <p>Roblox Weapon Specialist</p>
            <h1>CREATING THE<br>UNREAL.</h1>
        </section>

        <div class="grid">
            <div class="card">
                <div class="img-stack">
                    <div onclick="openLightbox('assets/blenderlongsword2.png')">
                        <img src="assets/blenderlongsword2.png">
                    </div>
                    <div onclick="openLightbox('assets/rblxlongsword1.png')">
                        <img src="assets/rblxlongsword1.png">
                    </div>
                </div>
                <div class="card-title">LONGSWORD V.2</div>
                <div class="specs">
                    <div class="badge">1.8k Tris</div>
                    <div class="badge">PBR Textures</div>
                    <div class="badge">Optimized Collision</div>
                </div>
            </div>

            <div class="card">
                <div class="img-stack">
                    <div onclick="openLightbox('assets/blenderlongrapier.png')">
                        <img src="assets/blenderlongrapier.png">
                    </div>
                    <div onclick="openLightbox('assets/rblxrapier.png')">
                        <img src="assets/rblxrapier.png">
                    </div>
                </div>
                <div class="card-title">ROYAL RAPIER</div>
                <div class="specs">
                    <div class="badge">2.4k Tris</div>
                    <div class="badge">Custom Hilt mesh</div>
                    <div class="badge">Studio-Ready</div>
                </div>
            </div>
        </div>

        <section class="contact-section">
            <h2 style="font-size: 3rem; margin-bottom: 30px;">HAVE A PROJECT?</h2>
            <a href="#" class="discord-btn" onclick="copyDiscord()">DISCORD: kh07_</a>
            <p id="copy-msg" style="margin-top:15px; font-size: 0.7rem; color: var(--accent); opacity: 0;">COPIED TO CLIPBOARD</p>
        </section>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lb-img" src="">
    </div>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Lightbox
        function openLightbox(src) {
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        // Copy Discord
        function copyDiscord() {
            navigator.clipboard.writeText("kh07_");
            const msg = document.getElementById('copy-msg');
            msg.style.opacity = "1";
            setTimeout(() => { msg.style.opacity = "0"; }, 2000);
        }
    </script>
</body>
</html>
