<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Sword Portfolio</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #00d2ff;
            --secondary: #888;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 60px 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: auto;
        }
        header {
            text-align: center;
            margin-bottom: 60px;
        }
        h1 { 
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--accent);
            margin-bottom: 10px;
        }
        p.subtitle { color: var(--secondary); font-size: 1.1rem; }
        
        .portfolio-grid {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }
        .sword-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s ease;
        }
        .sword-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        .sword-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sword-title::before {
            content: "";
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }
        .image-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 650px) {
            .image-comparison { grid-template-columns: 1fr; }
        }
        img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 10px;
            background: #000;
            display: block;
            margin-bottom: 10px;
            border: 1px solid #222;
        }
        .label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sword Modeling Portfolio</h1>
        <p class="subtitle">High-quality assets for Roblox, modeled in Blender.</p>
    </header>

    <div class="portfolio-grid">
        <div class="sword-card">
            <div class="sword-title">Longsword</div>
            <div class="image-comparison">
                <div class="img-container">
                    <img src="assets/blenderlongsword2.png" alt="Blender View">
                    <div class="label">Blender Render</div>
                </div>
                <div class="img-container">
                    <img src="assets/rblxlongsword1.png" alt="Roblox Studio View">
                    <div class="label">Roblox Studio</div>
                </div>
            </div>
        </div>

        </div>
</div>

</body>
</html>
